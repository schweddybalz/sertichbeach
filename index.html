<style>
  :root{
    --deep: #0a3a47;
    --sand: #d4af8e;
    --white: #f8f6f3;
    --muted: rgba(248,246,243,0.5);
    --line: rgba(248,246,243,0.15);
    --rising: #d4af8e;
    --falling: #7ba8c4;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; margin: 0; }
  body{
    background: linear-gradient(135deg, #051f2e 0%, var(--deep) 50%, #0a2d36 100%);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container{
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
  }

  .header{
    text-align: center;
    width: 100%;
  }
  
  .title{
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 0;
    line-height: 1;
    color: var(--white);
  }

  .main-content{
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .state-section{
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .state-label{
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .state-word{
    font-family: 'Playfair Display', serif;
    font-size: clamp(72px, 16vw, 120px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 0;
  }

  .state-word.rising{ color: var(--rising); }
  .state-word.falling{ color: var(--falling); }

  .wave-container{
    width: 100%;
    height: 140px;
    position: relative;
    margin: 20px 0;
  }

  svg.curve{ width: 100%; height: 100%; }

  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-3px); }
  }
  .marker-dot{ animation: bob 3s ease-in-out infinite; transform-origin: center; }

  .tide-info{
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .tide-item{
    text-align: center;
    padding: 20px;
    border-top: 1px solid var(--line);
  }

  .tide-item:first-child{ border-top: none; }

  .tide-label{
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .tide-main{
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 7vw, 52px);
    font-weight: 500;
    letter-spacing: 0.01em;
    margin: 0;
    margin-bottom: 4px;
  }

  .tide-sub{
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .weather-line{
    margin-top: 32px;
    padding: 16px;
    border-top: 1px solid var(--line);
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .footer{
    display: flex;
    justify-content: center;
    gap: 24px;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
    width: 100%;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }

  .footer button{
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .footer button:hover{
    color: var(--white);
    border-color: var(--white);
  }

  .status-msg{
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    padding: 60px 20px;
  }

  /* Tablet & desktop */
  @media (min-width: 768px){
    .container{ gap: 60px; }
    .main-content{ gap: 50px; }
    .tide-info{ flex-direction: row; justify-content: center; gap: 60px; }
    .tide-item{ flex: 0 1 auto; border: none; padding: 0; }
    .title{ font-size: 80px; }
    .state-word{ font-size: 120px; }
    .tide-main{ font-size: 52px; }
  }

  @media (prefers-reduced-motion: reduce){
    .marker-dot { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">Sertich Beach Tide</h1>
    </div>

    <div id="content">
      <div class="status-msg" id="status">Loading…</div>
    </div>

    <div class="footer">
      <span id="updated"></span>
      <button id="refresh">REFRESH</button>
    </div>
  </div>

<script>
const TIDE_STATION = "8665552";
const TZ = "America/New_York";
let predictions = [];
let weather = {};

function pad(n){ return String(n).padStart(2,'0'); }

function fmtDate(d){
  return d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate());
}

async function fetchPredictions(){
  const today = new Date();
  const begin = new Date(today.getTime() - 2*24*3600*1000);
  const end = new Date(today.getTime() + 3*24*3600*1000);
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=tide_watch_app&begin_date=${fmtDate(begin)}&end_date=${fmtDate(end)}&datum=MLLW&station=${TIDE_STATION}&time_zone=gmt&units=english&interval=hilo&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("Tide request failed");
  const data = await res.json();
  if(!data.predictions) throw new Error("No tide data");
  return data.predictions.map(p => ({
    time: new Date(p.t.replace(' ','T') + 'Z'),
    type: p.type,
    height: parseFloat(p.v)
  })).sort((a,b) => a.time - b.time);
}

async function fetchWeather(){
  try {
    const cmanUrl = `https://www.ndbc.noaa.gov/data/realtime2/CHTS1.txt`;
    const cmanRes = await fetch(cmanUrl);
    const cmanText = await cmanRes.text();
    const cmanLines = cmanText.split('\n');
    const cmanData = cmanLines[2]?.split(/\s+/) || [];
    
    const windSpd = cmanData[9] !== 'MM' ? parseFloat(cmanData[9]) * 1.94 : null;
    const airTemp = cmanData[14] !== 'MM' ? (parseFloat(cmanData[14]) * 9/5 + 32) : null;

    const buoyUrl = `https://www.ndbc.noaa.gov/data/realtime2/41004.txt`;
    const buoyRes = await fetch(buoyUrl);
    const buoyText = await buoyRes.text();
    const buoyLines = buoyText.split('\n');
    const buoyData = buoyLines[2]?.split(/\s+/) || [];
    
    const waterTemp = buoyData[13] !== 'MM' ? (parseFloat(buoyData[13]) * 9/5 + 32) : null;

    return { windSpd, airTemp, waterTemp };
  } catch(err) {
    return { windSpd: null, airTemp: null, waterTemp: null };
  }
}

function findWindow(now){
  let last = null, next = null;
  for(const p of predictions){
    if(p.time <= now) last = p;
    if(p.time > now && !next) next = p;
  }
  return {last, next};
}

function fmtTime(d){
  return d.toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
}

function fmtDuration(ms){
  const mins = Math.round(Math.abs(ms)/60000);
  const h = Math.floor(mins/60);
  const m = mins % 60;
  if(h === 0) return `${m}m`;
  if(m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function buildCurvePath(isRising, w, h){
  const N = 100;
  let d = "";
  for(let i=0;i<=N;i++){
    const frac = i/N;
    let y;
    if(isRising){
      y = h - ((1 - Math.cos(Math.PI*frac))/2)*h;
    } else {
      y = ((1 - Math.cos(Math.PI*frac))/2)*h;
    }
    const x = (i/N)*w;
    d += (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
  }
  return d;
}

function render(){
  const now = new Date();
  const { last, next } = findWindow(now);
  const content = document.getElementById('content');

  if(!last || !next){
    content.innerHTML = '<div class="status-msg">Tide data unavailable.</div>';
    return;
  }

  const rising = next.type === 'H';
  const stateWord = rising ? 'RISING' : 'FALLING';
  const stateClass = rising ? 'rising' : 'falling';
  const nextType = next.type === 'H' ? 'HIGH' : 'LOW';
  const lastType = last.type === 'H' ? 'HIGH' : 'LOW';

  const W = 400, H = 100;
  const pathD = buildCurvePath(rising, W, H);
  const totalMs = next.time - last.time;
  const elapsedMs = now - last.time;
  const frac = Math.min(1, Math.max(0, elapsedMs/totalMs));
  const mx = frac * W;
  const my = rising
    ? H - ((1 - Math.cos(Math.PI*frac))/2)*H
    : ((1 - Math.cos(Math.PI*frac))/2)*H;

  const { windSpd, airTemp, waterTemp } = weather;
  const weatherHtml = `<div class="weather-line">
    ${airTemp !== null ? `${Math.round(airTemp)}°F` : '—'} air 
    &middot; ${waterTemp !== null ? `${Math.round(waterTemp)}°F` : '—'} water 
    &middot; ${windSpd !== null ? `${Math.round(windSpd)} kt` : '—'} wind
  </div>`;

  content.innerHTML = `
    <div class="main-content">
      <div class="state-section">
        <div class="state-word ${stateClass}">${stateWord}</div>
      </div>

      <div class="wave-container">
        <svg class="curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <path d="${pathD}" 
            fill="none" 
            stroke="${rising ? 'rgba(212,175,142,0.4)' : 'rgba(123,168,196,0.4)'}" 
            stroke-width="2.5" />
          <circle class="marker-dot" cx="${mx}" cy="${my}" r="5" fill="${rising ? '#d4af8e' : '#7ba8c4'}" />
        </svg>
      </div>

      <div class="tide-info">
        <div class="tide-item">
          <div class="tide-label">Next Tide</div>
          <div class="tide-main">${fmtTime(next.time)}</div>
          <div class="tide-sub">${nextType} • in ${fmtDuration(next.time - now)}</div>
        </div>
        <div class="tide-item">
          <div class="tide-label">Last Tide</div>
          <div class="tide-main">${fmtTime(last.time)}</div>
          <div class="tide-sub">${lastType} • ${fmtDuration(now - last.time)} ago</div>
        </div>
      </div>

      ${weatherHtml}
    </div>
  `;
  
  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
}

document.getElementById('refresh').addEventListener('click', async () => {
  try{
    predictions = await fetchPredictions();
    weather = await fetchWeather();
    render();
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="status-msg">Couldn't reach services.</div>`;
  }
});

async function loadAndRender(){
  try{
    predictions = await fetchPredictions();
    weather = await fetchWeather();
    render();
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="status-msg">Couldn't reach services.</div>`;
  }
}

setInterval(() => { if(predictions.length) render(); }, 15000);
setInterval(loadAndRender, 30*60*1000);
loadAndRender();
</script>
</body>
</html>
