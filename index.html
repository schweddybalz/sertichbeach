<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sertich Beach Tide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --deep: #0a3a47;
    --sand: #d4af8e;
    --white: #f8f6f3;
    --muted: rgba(248,246,243,0.5);
    --line: rgba(248,246,243,0.15);
    --rising: #d4af8e;
    --falling: #7ba8c4;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; margin: 0; }
  body{
    background: linear-gradient(135deg, #051f2e 0%, var(--deep) 50%, #0a2d36 100%);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container{
    width: 100%;
    max-width: 1200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
  }

  .header{
    text-align: center;
    width: 100%;
  }
  .location{
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .title{
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 72px);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 0;
    line-height: 1;
    color: var(--white);
  }

  .content{
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .state-section{
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .state-label{
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .state-word{
    font-family: 'Playfair Display', serif;
    font-size: clamp(80px, 15vw, 140px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 0;
  }

  .state-word.rising{ color: var(--rising); }
  .state-word.falling{ color: var(--falling); }

  .next-tide{
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .next-label{
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .next-time{
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 8vw, 64px);
    font-weight: 500;
    letter-spacing: 0.01em;
    margin: 0;
  }

  .next-countdown{
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .next-countdown.rising{ color: var(--rising); }
  .next-countdown.falling{ color: var(--falling); }

  .footer{
    display: flex;
    justify-content: center;
    gap: 24px;
    align-items: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
    width: 100%;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }

  .footer button{
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border-radius: 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .footer button:hover{
    color: var(--white);
    border-color: var(--white);
  }

  .status-msg{
    text-align: center;
    color: var(--muted);
    font-size: 16px;
    padding: 60px 20px;
  }

  /* Tablet & desktop */
  @media (min-width: 768px){
    .container{ gap: 80px; }
    .content{ flex-direction: row; justify-content: center; align-items: flex-start; gap: 120px; }
    .state-section{ flex: 0 1 auto; }
    .next-tide{ flex: 0 1 auto; }
    .title{ font-size: 80px; }
    .state-word{ font-size: 140px; }
    .next-time{ font-size: 64px; }
  }

  @media (prefers-reduced-motion: reduce){
    * { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="location">Sertich Beach Tide</div>
      <h1 class="title">TIDE</h1>
    </div>

    <div id="content">
      <div class="status-msg" id="status">Loading&hellip;</div>
    </div>

    <div class="footer">
      <span id="updated"></span>
      <button id="refresh">REFRESH</button>
    </div>
  </div>

<script>
const STATION = "8665552"; // NOAA Breach Inlet, SC
const TZ = "America/New_York";
let predictions = [];

function pad(n){ return String(n).padStart(2,'0'); }

function fmtDate(d){
  return d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate());
}

async function fetchPredictions(){
  const today = new Date();
  const begin = new Date(today.getTime() - 2*24*3600*1000);
  const end = new Date(today.getTime() + 3*24*3600*1000);
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=tide_watch_app&begin_date=${fmtDate(begin)}&end_date=${fmtDate(end)}&datum=MLLW&station=${STATION}&time_zone=gmt&units=english&interval=hilo&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("NOAA request failed");
  const data = await res.json();
  if(!data.predictions) throw new Error("No prediction data returned");
  return data.predictions.map(p => ({
    time: new Date(p.t.replace(' ','T') + 'Z'),
    type: p.type,
    height: parseFloat(p.v)
  })).sort((a,b) => a.time - b.time);
}

function findWindow(now){
  let last = null, next = null;
  for(const p of predictions){
    if(p.time <= now) last = p;
    if(p.time > now && !next) next = p;
  }
  return {last, next};
}

function fmtTime(d){
  return d.toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
}

function fmtDuration(ms){
  const mins = Math.round(Math.abs(ms)/60000);
  const h = Math.floor(mins/60);
  const m = mins % 60;
  if(h === 0) return `${m}m`;
  if(m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function render(){
  const now = new Date();
  const { last, next } = findWindow(now);
  const content = document.getElementById('content');

  if(!last || !next){
    content.innerHTML = '<div class="status-msg">Tide data unavailable.</div>';
    return;
  }

  const rising = next.type === 'H';
  const stateWord = rising ? 'RISING' : 'FALLING';
  const stateClass = rising ? 'rising' : 'falling';
  const nextType = next.type === 'H' ? 'HIGH' : 'LOW';
  const timeStr = fmtTime(next.time);
  const countdownStr = fmtDuration(next.time - now);

  content.innerHTML = `
    <div class="content">
      <div class="state-section">
        <div class="state-label">Water</div>
        <div class="state-word ${stateClass}">${stateWord}</div>
      </div>
      <div class="next-tide">
        <div class="next-label">Next Tide</div>
        <div class="next-time">${timeStr}</div>
        <div class="next-countdown ${stateClass}">${nextType} • ${countdownStr}</div>
      </div>
    </div>
  `;
  
  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
}

document.getElementById('refresh').addEventListener('click', async () => {
  try{
    predictions = await fetchPredictions();
    render();
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="status-msg">Couldn't reach tide service.</div>`;
  }
});

async function loadAndRender(){
  const statusEl = document.getElementById('status');
  try{
    predictions = await fetchPredictions();
    render();
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="status-msg">Couldn't reach tide service.</div>`;
  }
}

setInterval(() => { if(predictions.length) render(); }, 15000);
setInterval(loadAndRender, 30*60*1000);
loadAndRender();
</script>
</body>
</html>
