<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sertich Beach Tide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Public+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:#0B3D3E;
    --deep2:#0E2F42;
    --marsh:#4C6B4F;
    --marsh-dark:#33492F;
    --sand:#E4D9BE;
    --foam:#F6F7F2;
    --rising:#E8A33D;
    --falling:#6FA8B8;
    --muted: rgba(246,247,242,0.55);
    --line: rgba(246,247,242,0.14);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(120% 90% at 50% -10%, #123B4F 0%, var(--deep) 45%, #071F20 100%);
    color:var(--foam);
    font-family:'Public Sans', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px 16px;
    overflow-x:hidden;
  }
  .card{
    width:100%;
    max-width:440px;
    position:relative;
  }
  .eyebrow{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-size:12.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }
  .eyebrow .clock{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:400;
    font-size:26px;
    letter-spacing:0.01em;
    margin:0 0 18px 0;
    color:var(--foam);
  }
  h1 em{ font-style:italic; color:var(--sand); }

  .wave-wrap{
    position:relative;
    height:150px;
    border-radius:18px;
    overflow:hidden;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.12));
    margin-bottom:22px;
  }
  svg.curve{ position:absolute; inset:0; width:100%; height:100%; }
  .marker{
    filter: drop-shadow(0 0 6px rgba(232,163,61,0.7));
  }
  .marker.falling{ filter: drop-shadow(0 0 6px rgba(111,168,184,0.7)); }
  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-3px); }
  }
  .marker-dot{ animation: bob 3s ease-in-out infinite; transform-origin:center; }
  @media (prefers-reduced-motion: reduce){ .marker-dot{ animation:none; } }

  .state-row{
    text-align:center;
    margin-bottom:26px;
  }
  .state-word{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:44px;
    letter-spacing:0.01em;
    line-height:1;
  }
  .state-word.rising{ color:var(--rising); }
  .state-word.falling{ color:var(--falling); }
  .state-sub{
    font-family:'Space Mono', monospace;
    font-size:14px;
    color:var(--muted);
    margin-top:6px;
  }

  .events{
    border-top:1px solid var(--line);
  }
  .event{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 2px;
    border-bottom:1px solid var(--line);
  }
  .event .label{
    font-size:11.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
  }
  .event .type{
    font-family:'Fraunces', serif;
    font-size:19px;
  }
  .event .time{
    font-family:'Space Mono', monospace;
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
  }
  .event .countdown{
    font-family:'Space Mono', monospace;
    font-size:15px;
    text-align:right;
  }
  .event.next .countdown{ color:var(--rising); }
  .event.next.falling-event .countdown{ color:var(--falling); }
  .event.last .countdown{ color:var(--muted); }

  .footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:16px;
    font-size:11.5px;
    color:var(--muted);
  }
  .footer button{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    font-family:'Public Sans', sans-serif;
    font-size:11.5px;
    padding:6px 10px;
    border-radius:20px;
    cursor:pointer;
  }
  .footer button:hover{ color:var(--foam); border-color:var(--muted); }

  .status-msg{
    text-align:center;
    padding:40px 10px;
    color:var(--muted);
    font-family:'Public Sans', sans-serif;
    font-size:14px;
  }

  .marsh-strip{
    position:absolute;
    bottom:0; left:0; right:0;
    height:36px;
    pointer-events:none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">
      <span>Sertich Beach</span>
      <span class="clock" id="clock">--:--</span>
    </div>
    <h1>Tide <em>watch</em></h1>

    <div id="content">
      <div class="status-msg" id="status">Loading tide data&hellip;</div>
    </div>

    <div class="footer">
      <span id="updated">&nbsp;</span>
      <button id="refresh">refresh</button>
    </div>
  </div>

<script>
const STATION = "8665530"; // NOAA Charleston Harbor — reference station for Sullivan's Island
const TZ = "America/New_York";
let predictions = [];

function pad(n){ return String(n).padStart(2,'0'); }

function fmtDate(d){
  return d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate());
}

async function fetchPredictions(){
  const today = new Date();
  const begin = new Date(today.getTime() - 2*24*3600*1000);
  const end = new Date(today.getTime() + 3*24*3600*1000);
  const url = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&application=tide_watch_app&begin_date=${fmtDate(begin)}&end_date=${fmtDate(end)}&datum=MLLW&station=${STATION}&time_zone=gmt&units=english&interval=hilo&format=json`;
  const res = await fetch(url);
  if(!res.ok) throw new Error("NOAA request failed");
  const data = await res.json();
  if(!data.predictions) throw new Error("No prediction data returned");
  return data.predictions.map(p => ({
    time: new Date(p.t.replace(' ','T') + 'Z'),
    type: p.type, // "H" or "L"
    height: parseFloat(p.v)
  })).sort((a,b) => a.time - b.time);
}

function findWindow(now){
  let last = null, next = null;
  for(const p of predictions){
    if(p.time <= now) last = p;
    if(p.time > now && !next) next = p;
  }
  return {last, next};
}

function fmtTime(d){
  return d.toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
}

function fmtDuration(ms){
  const mins = Math.round(Math.abs(ms)/60000);
  const h = Math.floor(mins/60);
  const m = mins % 60;
  if(h === 0) return `${m}m`;
  return `${h}h ${pad(m).replace(/^0/,'0')}m`.replace(/^(\d+)h 0m$/, '$1h');
}

function buildCurvePath(lastLow, w, h){
  // half-cosine from (0, y0) to (w, y1)
  const N = 60;
  let d = "";
  for(let i=0;i<=N;i++){
    const x = (i/N)*w;
    const frac = i/N;
    const y = h - ( (1 - Math.cos(Math.PI*frac))/2 ) * h;
    d += (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
  }
  return d;
}

function render(){
  const now = new Date();
  const { last, next } = findWindow(now);
  const statusEl = document.getElementById('status');
  const content = document.getElementById('content');

  if(!last || !next){
    content.innerHTML = '<div class="status-msg">Tide data unavailable right now.</div>';
    return;
  }

  const rising = next.type === 'H';
  const stateWord = rising ? 'Rising' : 'Falling';
  const stateClass = rising ? 'rising' : 'falling';

  const totalMs = next.time - last.time;
  const elapsedMs = now - last.time;
  const frac = Math.min(1, Math.max(0, elapsedMs/totalMs));
  const curHeight = last.height + (next.height - last.height) * ((1 - Math.cos(Math.PI*frac))/2);

  // curve geometry: going low->high draws upward-opening curve, high->low the mirror
  const W = 400, H = 110, PAD = 14;
  const usableH = H - PAD*2;
  const goingUp = next.type === 'H';
  let pathD;
  if(goingUp){
    pathD = buildCurvePath(true, W, usableH);
  } else {
    // mirror vertically
    const N = 60;
    let d = "";
    for(let i=0;i<=N;i++){
      const x = (i/N)*W;
      const frac2 = i/N;
      const y = ( (1 - Math.cos(Math.PI*frac2))/2 ) * usableH;
      d += (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
    }
    pathD = d;
  }
  // marker position along the same curve at `frac`
  const mx = frac * W;
  const my = goingUp
    ? usableH - ((1 - Math.cos(Math.PI*frac))/2)*usableH
    : ((1 - Math.cos(Math.PI*frac))/2)*usableH;

  content.innerHTML = `
    <div class="wave-wrap">
      <svg class="curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <path d="${pathD}" transform="translate(0, ${PAD})"
          fill="none" stroke="${rising ? 'rgba(232,163,61,0.55)' : 'rgba(111,168,184,0.55)'}" stroke-width="2.5" />
        <circle class="marker-dot marker ${rising?'':'falling'}" cx="${mx}" cy="${my+PAD}" r="6" fill="${rising ? '#E8A33D' : '#6FA8B8'}" />
      </svg>
    </div>

    <div class="state-row">
      <div class="state-word ${stateClass}">${stateWord}</div>
      <div class="state-sub">approx. ${curHeight.toFixed(1)} ft &middot; MLLW</div>
    </div>

    <div class="events">
      <div class="event next ${rising?'':'falling-event'}">
        <div>
          <div class="label">Next tide</div>
          <div class="type">${next.type === 'H' ? 'High' : 'Low'} &middot; ${next.height.toFixed(1)} ft</div>
          <div class="time">${fmtTime(next.time)}</div>
        </div>
        <div class="countdown">in ${fmtDuration(next.time - now)}</div>
      </div>
      <div class="event last">
        <div>
          <div class="label">Last tide</div>
          <div class="type">${last.type === 'H' ? 'High' : 'Low'} &middot; ${last.height.toFixed(1)} ft</div>
          <div class="time">${fmtTime(last.time)}</div>
        </div>
        <div class="countdown">${fmtDuration(now - last.time)} ago</div>
      </div>
    </div>
  `;
}

function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit', second:'2-digit' });
}

async function loadAndRender(){
  const statusEl = document.getElementById('status');
  try{
    predictions = await fetchPredictions();
    render();
    document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString('en-US', { timeZone: TZ, hour:'numeric', minute:'2-digit' });
  }catch(err){
    document.getElementById('content').innerHTML = `<div class="status-msg">Couldn't reach NOAA's tide service. Check your connection and tap refresh.<br><span style="opacity:0.6">(${err.message})</span></div>`;
  }
}

document.getElementById('refresh').addEventListener('click', loadAndRender);
setInterval(() => { if(predictions.length) render(); tickClock(); }, 15000);
setInterval(loadAndRender, 30*60*1000); // refetch every 30 min
tickClock();
loadAndRender();
</script>
</body>
</html>
